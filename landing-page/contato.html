<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[SEU NOME] - Contato</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="curriculo.html">Currículo</a>
  <a href="github.html">GitHub</a>
  <a href="servicos.html">Serviços</a>
  <a href="contato.html" class="ativo">Contato</a>
</nav>

<h1>Contato</h1>
<p>Preencha o formulário e entrarei em contato em breve.</p>

<form onsubmit="enviar(event)">

  <label for="nome">Nome completo</label>
  <input type="text" id="nome" placeholder="Seu nome" required>

  <label for="tel">Telefone / WhatsApp</label>
  <input type="tel" id="tel" placeholder="(XX) XXXXX-XXXX" required>

  <label for="email">E-mail</label>
  <input type="email" id="email" placeholder="seuemail@email.com" required>

  <label>Tipo de pessoa</label>
  <div class="inline-labels">
    <label><input type="radio" name="tipo" value="fisica" required> Pessoa Física</label>
    <label><input type="radio" name="tipo" value="juridica"> Pessoa Jurídica</label>
  </div>

  <label for="horario">Melhor horário de contato</label>
  <select id="horario">
    <option value="">Selecione...</option>
    <option>Manhã (08h–12h)</option>
    <option>Tarde (12h–18h)</option>
    <option>Noite (18h–22h)</option>
    <option>Qualquer horário</option>
  </select>

  <label>Serviço desejado</label>
  <div class="inline-labels">
    <label><input type="checkbox" value="estatico"> Site estático</label>
    <label><input type="checkbox" value="dinamico"> Site dinâmico</label>
    <label><input type="checkbox" value="avancado"> Sistema avançado</label>
    <label><input type="checkbox" value="manutencao"> Manutenção</label>
  </div>

  <label for="segmento">Segmento</label>
  <select id="segmento">
    <option value="">Selecione seu segmento...</option>
    <option>Alimentação</option>
    <option>Academia / Fitness</option>
    <option>Esporte</option>
    <option>Educação</option>
    <option>Comércio</option>
    <option>Serviços gerais</option>
    <option>Eventos</option>
    <option>Outro</option>
  </select>

  <label for="desc">Descrição do projeto</label>
  <textarea id="desc" placeholder="Descreva o que você precisa: páginas, funcionalidades, prazo, referências..."></textarea>

  <button type="submit">Enviar</button>
</form>

<p id="sucesso">Mensagem enviada! Entrarei em contato em breve.</p>

<footer>
  <p>[SEU NOME] &nbsp;·&nbsp;
    <a href="servicos.html">Serviços</a> &nbsp;·&nbsp;
    <a href="contato.html">Contato</a> &nbsp;·&nbsp;
    <a href="github.html">GitHub</a>
  </p>
</footer>

<script>
  function enviar(e) {
    e.preventDefault();
    document.getElementById('sucesso').style.display = 'block';
    e.target.reset();
  }
</script>

</body>
</html>
